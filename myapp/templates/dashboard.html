{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">

  <!-- Welcome Banner -->
  <div class="p-4 mb-4 rounded text-white" style="background-color: #0d6efd;">
    <h3 class="mb-1">Welcome {{ user.username }} 🚀</h3>
    <p class="mb-0">This is your dashboard</p>
  </div>

  <!-- Dashboard Cards -->
  <div class="row g-3">

    <div class="col-md-4">
      <div class="card text-center shadow-sm p-4 h-100">
        <div class="fs-1 mb-2">📁</div>
        <h5 class="fw-bold">Projects</h5>
        <p class="text-muted mb-0">View your work</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-center shadow-sm p-4 h-100">
        <div class="fs-1 mb-2">🗂️</div>
        <h5 class="fw-bold">Files</h5>
        <p class="text-muted mb-0">Manage uploads</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-center shadow-sm p-4 h-100">
        <div class="fs-1 mb-2">⚙️</div>
        <h5 class="fw-bold">Settings</h5>
        <p class="text-muted mb-0">Account settings</p>
      </div>
    </div>

  </div>
</div>
{% endblock %}
